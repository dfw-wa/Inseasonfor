name: Retry Daily Update on Failure or Timeout Cancel (Delayed, Max 2 Retries)

on:
  workflow_run:
    workflows: ["Daily Update and Deployment"]
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  retry_after_delay:
    # Retry at most twice (attempts: 1 original, 2 rerun, 3 rerun).
    #
    # Retry if:
    # - failed, OR
    # - cancelled AND it looks like a timeout-based cancellation (ran close to timeout-minutes)
    if: >-
      github.event.workflow_run.run_attempt < 3 &&
      (
        github.event.workflow_run.conclusion == 'failure' ||
        (
          github.event.workflow_run.conclusion == 'cancelled' &&
          github.event.workflow_run.run_duration_ms >= 1680000
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Wait 20 minutes before retry
        run: sleep 1200

      - name: Re-run the workflow
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          gh api -X POST "repos/${REPO}/actions/runs/${RUN_ID}/rerun"
