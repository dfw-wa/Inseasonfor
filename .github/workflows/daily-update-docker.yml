name: Daily Update and Deployment (Docker)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '00 14 * * *'  # 7am Pacific

permissions:
  contents: write
  packages: read

jobs:
  render_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/dfw-wa/inseasonfor:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Render the rmarkdown
      # (R packages are pre-installed in the Docker image — no renv restore needed)
      - name: Render the report using custom script (with retries)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i: rendering report..."
            if Rscript inst/scripts/run_render.R; then
              echo "Render succeeded on attempt $i"
              break
            fi
            echo "Render failed on attempt $i"
            if [ $i -lt 3 ]; then
              echo "Retrying in 2 minutes..."
              sleep 120
            else
              echo "All attempts failed."
              exit 1
            fi
          done

      # 3. Commit updated CSVs (if changed)
      - name: Commit and push updated CSV files
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.email "mark.sorel@dfw.wa.gov"
          git config user.name "marksorel8"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/dfw-wa/Inseasonfor.git
          git add inst/data-cache/*.csv || true
          git diff --cached --quiet || git commit -m "Update CSV files"
          git push origin main

      # 6. Deploy the html from the rendered Rmarkdown to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: site
